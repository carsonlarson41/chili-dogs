<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>CHILLI DOGS • UNBLOCKED</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bangers&family=Creepster&display=swap');
    
    body {
      margin: 0;
      font-family: 'Press Start 2P', Arial;
      background: #0a0a1f;
      color: #00ffcc;
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(to right, #ff00aa, #00ffff);
      color: #000;
      padding: 18px;
      text-align: center;
      font-family: 'Bangers', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      text-shadow: 4px 4px 0 #000;
      border-bottom: 6px solid #00ffcc;
    }
    
    .ticker {
      background: #000;
      color: #ff00aa;
      padding: 10px 0;
      overflow: hidden;
      border-bottom: 3px solid #00ffff;
      white-space: nowrap;
    }
    
    .ticker-content {
      display: inline-block;
      padding-left: 100%;
      animation: ticker-slide 25s linear infinite;
      font-size: 14px;
      font-family: 'Press Start 2P';
    }
    
    @keyframes ticker-slide {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    
    .sidebar h2 {
      font-family: 'Creepster', cursive;
      font-size: 26px;
      color: #ff00aa;
      text-shadow: 0 0 10px #ff00aa;
    }
    
    .game-card h4 {
      font-family: 'Bangers', sans-serif;
      font-size: 18px;
      margin: 8px 0 4px 0;
      color: #00ffff;
    }
    
    .container { display: flex; height: calc(100vh - 118px); }
    
    .sidebar {
      width: 260px;
      background: #111133;
      padding: 20px;
      border-right: 4px solid #00ffcc;
      overflow-y: auto;
      box-shadow: 0 0 20px #00ffff;
    }
    
    .main { flex: 1; display: flex; flex-direction: column; }
    
    .tab-bar {
      background: #1a1a2e;
      padding: 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 4px solid #ff00aa;
    }
    
    .tab {
      padding: 14px 22px;
      background: #16213e;
      border: 3px solid #00ffcc;
      color: #00ffcc;
      font-family: 'Press Start 2P';
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab:hover { background: #00ffcc; color: #000; }
    .tab.active {
      background: #ff00aa;
      color: white;
      border-color: #ff00aa;
      box-shadow: 0 0 20px #ff00aa;
    }
    
    iframe { flex: 1; border: none; background: #000; }
    
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      padding: 25px;
      overflow-y: auto;
    }
    
    .game-card {
      background: #1a1a2e;
      border: 3px solid #00ffff;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
    }
    
    .game-card:hover {
      transform: scale(1.12) rotate(4deg);
      border-color: #ff00aa;
      box-shadow: 0 0 35px #ff00aa;
    }
    
    .game-card img {
      width: 100%;
      height: 125px;
      object-fit: cover;
      border: 2px solid #00ffcc;
    }
    
    input {
      width: 100%;
      padding: 15px;
      background: #0a0a1f;
      border: 3px solid #00ffcc;
      color: #00ffcc;
      font-family: 'Press Start 2P';
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <div class="header">CHILLI DOGS</div>
  
  <div class="ticker">
    <div class="ticker-content">
      ★ THIS IS MY NEW GAME SITE ★ SORRY IF IT'S BUGGY ★ MADE WITH AI ★ HAVE FUN & STAY SAFE ★ 
    </div>
  </div>
  
  <div class="container">
    <div class="sidebar">
      <h2>CHILLI DOGS</h2>
      <input type="text" id="search" placeholder="SEARCH GAMES..." onkeyup="filterGames()">
    </div>

    <div class="main">
      <div class="tab-bar">
        <button class="tab active" onclick="switchTab(0)">ALL GAMES</button>
        <button class="tab" onclick="switchTab(1)">2 PLAYER</button>
        <button class="tab" onclick="switchTab(2)">🕸️ DUCKDUCKGO BROWSER</button>
      </div>

      <div id="tab0" class="tab-content">
        <div class="game-grid" id="gameGrid"></div>
      </div>

      <div id="tab1" class="tab-content" style="display:none;">
        <div class="game-grid" id="twoPlayerGrid"></div>
      </div>

      <div id="tab2" class="tab-content" style="display:none; flex-direction:column;">
        <input type="text" id="urlBar" value="https://duckduckgo.com" 
               onkeypress="if(event.key==='Enter') loadBrowser()">
        <iframe id="browser" src="https://duckduckgo.com"></iframe>
      </div>
    </div>
  </div>

  <script>
    const games = [
      {name:"FNAF 1", url:"https://fnaf1.io/", img:"https://via.placeholder.com/300x180/990000/fff?text=FNAF+1"},
      {name:"FNAF 2", url:"https://fnafgames.io/fnaf2", img:"https://via.placeholder.com/300x180/990000/fff?text=FNAF+2"},
      {name:"FNAF 3", url:"https://fnafgames.io/fnaf3", img:"https://via.placeholder.com/300x180/990000/fff?text=FNAF+3"},
      {name:"FNAF 4", url:"https://fnafgames.io/fnaf4", img:"https://via.placeholder.com/300x180/990000/fff?text=FNAF+4"},
      {name:"Sister Location", url:"https://fnafgame.io/five-nights-at-freddys-sister-location", img:"https://via.placeholder.com/300x180/990000/fff?text=SISTER"},
      {name:"UCN", url:"https://fivenightsatfreddysgame.io/", img:"https://via.placeholder.com/300x180/990000/fff?text=UCN"},
      {name:"Cookie Clicker", url:"https://orteil.dashnet.org/cookieclicker/", img:"https://via.placeholder.com/300x180/ffcc00/000?text=COOKIE"},
      {name:"Slope", url:"https://slope3.com", img:"https://via.placeholder.com/300x180/00ccff/000?text=SLOPE"},
      {name:"Tunnel Rush", url:"https://tunnelrushgame.io", img:"https://via.placeholder.com/300x180/ff00ff/fff?text=TUNNEL"},
      {name:"Paper.io 3D", url:"https://paperio3d.org", img:"https://via.placeholder.com/300x180/4488ff/fff?text=PAPER.IO"},
      {name:"2048", url:"https://play2048.co", img:"https://via.placeholder.com/300x180/0066ff/fff?text=2048"},
      {name:"Tic Tac Toe", url:"https://www.mathsisfun.com/games/tic-tac-toe.html", img:"https://via.placeholder.com/300x180/ffff00/000?text=TIC TAC"},
      {name:"Moto X3M", url:"https://motox3m.io", img:"https://via.placeholder.com/300x180/ff8800/fff?text=MOTO+X3M"},
      {name:"Moto X3M 2", url:"https://motox3m2.io", img:"https://via.placeholder.com/300x180/ff8800/fff?text=MOTO+X3M+2"},
      {name:"Moto X3M 3", url:"https://motox3m3.io", img:"https://via.placeholder.com/300x180/ff8800/fff?text=MOTO+X3M+3"},
      {name:"Moto X3M Winter", url:"https://motox3mwinter.io", img:"https://via.placeholder.com/300x180/88ccff/000?text=MOTO+WINTER"},
      {name:"Moto X3M Pool Party", url:"https://motox3mpoolparty.io", img:"https://via.placeholder.com/300x180/ff00aa/fff?text=POOL+PARTY"},
      {name:"2048", url:"https://play2048.co", img:"https://via.placeholder.com/300x180/0066ff/fff?text=2048"},
      {name:"Math Match", url:"https://www.coolmathgames.com/0-math-match", img:"https://via.placeholder.com/300x180/00cc99/fff?text=MATH+MATCH"},
      {name:"Crazy Eights Math", url:"https://www.mathplayground.com/crazy_eights.html", img:"https://via.placeholder.com/300x180/ffcc00/000?text=CRAZY+EIGHTS"},
      {name:"Multiplication Racing", url:"https://www.mathplayground.com/multiplication_racing.html", img:"https://via.placeholder.com/300x180/ff6600/fff?text=MULTI+RACE"},
      {name:"Fraction Pizza", url:"https://www.mathplayground.com/fractions_pizza.html", img:"https://via.placeholder.com/300x180/ff99cc/000?text=PIZZA+FRAC"},
      {name:"Slope", url:"https://slope3.com", img:"https://via.placeholder.com/300x180/00ccff/000?text=SLOPE"},
      {name:"Cookie Clicker", url:"https://orteil.dashnet.org/cookieclicker/", img:"https://via.placeholder.com/300x180/ffcc00/000?text=COOKIE"},
      {name:"Tic Tac Toe", url:"https://www.mathsisfun.com/games/tic-tac-toe.html", img:"https://via.placeholder.com/300x180/ffff00/000?text=TIC TAC"},

    function renderGames() {
      const grid = document.getElementById('gameGrid');
      grid.innerHTML = '';
      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `<img src="${game.img}"><h4>${game.name}</h4>`;
        card.onclick = () => openGame(game.url);
        grid.appendChild(card);
      });
    }

    function openGame(url) {
      document.getElementById('tab0').innerHTML = `<iframe src="${url}" style="width:100%;height:100vh;"></iframe>`;
    }

    function loadBrowser() {
      let url = document.getElementById('urlBar').value;
      if (!url.startsWith('http')) url = 'https://' + url;
      document.getElementById('browser').src = url;
    }

    function switchTab(n) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
      document.querySelectorAll('.tab-content').forEach((c,i) => c.style.display = (i===n) ? 'flex' : 'none');
    }

    function filterGames() {
      console.log("Search active");
    }

    renderGames();
  </script>
</body>
</html>
